<body>

<!-- Scroll progress bar -->
<div id="scrollProgressBar"></div>

<!-- Ambient decoration -->
<div class="bg-grid"></div>
<div class="ambient-orbs">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>
</div>

<!-- Noise overlay -->
<div class="noise-overlay"></div>

<!-- Custom cursor -->
<div class="cursor-dot" id="cursorDot"></div>

<!-- Language toggle — EN/CN sliding pill, top-left -->
<button class="lang-toggle" id="langToggle" aria-label="Switch language" title="English / 中文">
  <span class="lang-option" data-lang="en">EN</span>
  <span class="lang-option" data-lang="cn">中文</span>
  <span class="lang-pill"></span>
</button>

<!-- Cinematic FX layer for theme transitions -->
<div id="fx-layer"></div>
<!-- Dark mode rotating celestial arc -->
<div class="dark-arc"></div>
<!-- Dark mode floating particles -->
<div class="dark-particles" id="darkParticles"></div>

<!-- Theme toggle — sun/moon animated switch -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle light/dark theme">
  <div class="theme-toggle-track">
    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>

  </div>
</button>

<main class="main">
  <div class="page-content" id="pageContent"></div>
</main>

<div class="toast-container" id="toastContainer"></div>

<!-- Admin modal -->
<div class="modal-overlay" id="adminModal" style="display:none;">
  <div class="modal">
    <h3 class="modal-title">Sign In</h3>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="adminUsername" placeholder="Username" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="adminPassword" placeholder="Password" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="adminCancel">Cancel</button>
      <button class="btn btn-accent" id="adminSubmit">Sign In</button>
    </div>
  </div>
</div>

<script>
(function() {
  var html = document.documentElement;

  // --- Theme Toggle (GSAP cinematic if available, simple fallback otherwise) ---
  var themeToggleBtn = document.getElementById('themeToggle');
  var isAnimating = false;
  if (localStorage.getItem('paperlens_theme') === 'dark') html.classList.add('dark');

  var hasGSAP = typeof gsap !== 'undefined';

  if (themeToggleBtn) {
    themeToggleBtn.classList.toggle('dark', html.classList.contains('dark'));
    themeToggleBtn.addEventListener('click', function() {
      if (isAnimating) return;

      var goingDark = !html.classList.contains('dark');

      if (hasGSAP) {
        // ─── Cinematic warp transition ───
        isAnimating = true;
        if (goingDark) { triggerWarpToDark(); } else { triggerWarpToLight(); }
      } else {
        // ─── Simple fallback (no GSAP) ───
        isAnimating = true;
        if (goingDark) {
          html.classList.add('dark');
          themeToggleBtn.classList.add('dark');
          localStorage.setItem('paperlens_theme', 'dark');
        } else {
          html.classList.remove('dark');
          themeToggleBtn.classList.remove('dark');
          localStorage.setItem('paperlens_theme', 'light');
        }
        // Use fxLayer for a quick flash transition
        var fx = document.getElementById('fx-layer');
        if (fx) {
          fx.style.display = 'block';
          fx.style.opacity = '1';
          fx.style.background = goingDark ? '#010103' : '#EAE7E2';
          fx.style.transition = 'opacity 0.4s ease-out';
          setTimeout(function() { fx.style.opacity = '0'; }, 50);
          setTimeout(function() { fx.style.display = 'none'; isAnimating = false; }, 500);
        } else {
          isAnimating = false;
        }
      }
    });
  }

  // --- GSAP Cinematic Transitions (only defined if GSAP is available) ---
  if (hasGSAP) {
    var warpOverlay = document.createElement('div');
    warpOverlay.id = 'warpOverlay';
    warpOverlay.style.cssText = 'position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0;';
    document.body.appendChild(warpOverlay);

    function triggerWarpToLight() {
      warpOverlay.style.pointerEvents = 'all';
      warpOverlay.style.background = '#EAE7E2';
      warpOverlay.style.opacity = '0';
      var tl = gsap.timeline({ onComplete: function() {
        warpOverlay.style.opacity = '0';
        warpOverlay.style.pointerEvents = 'none';
        isAnimating = false;
      }});
      tl.call(function() {
        html.classList.remove('dark');
        themeToggleBtn.classList.remove('dark');
        localStorage.setItem('paperlens_theme', 'light');
      }, null, 0);
      tl.to(warpOverlay, { opacity: 1, duration: 0.15, ease: 'power3.in' });
      tl.to('.page-content', { scale: 0.96, filter: 'blur(4px)', duration: 0.2, ease: 'power3.in' }, '-=0.1');
      tl.to(warpOverlay, { opacity: 0, duration: 0.7, ease: 'power4.out' }, '+=0.04');
      tl.to('.page-content', { scale: 1, filter: 'blur(0px)', duration: 0.6, ease: 'elastic.out(1, 0.5)' }, '-=0.65');
    }

    function triggerWarpToDark() {
      warpOverlay.style.pointerEvents = 'all';
      warpOverlay.style.background = '#010103';
      warpOverlay.style.opacity = '0';
      var tl = gsap.timeline({ onComplete: function() {
        warpOverlay.style.opacity = '0';
        warpOverlay.style.pointerEvents = 'none';
        isAnimating = false;
      }});
      tl.call(function() {
        html.classList.add('dark');
        themeToggleBtn.classList.add('dark');
        localStorage.setItem('paperlens_theme', 'dark');
      }, null, 0);
      tl.to(warpOverlay, { opacity: 1, duration: 0.18, ease: 'power3.in' });
      tl.to('.page-content', { scale: 0.96, filter: 'blur(4px)', duration: 0.2, ease: 'power3.in' }, '-=0.1');
      tl.to(warpOverlay, { opacity: 0, duration: 0.7, ease: 'power4.out' }, '+=0.03');
      tl.to('.page-content', { scale: 1, filter: 'blur(0px)', duration: 0.6, ease: 'elastic.out(1, 0.4)' }, '-=0.65');
    }
  }

  // --- Language ---
  window.__lang = localStorage.getItem('paperlens_lang') || 'en';

  window.__t = function(key, fallback) {
    var entry = window.__i18n && window.__i18n[key];
    if (entry) return entry[window.__lang] || entry.en || fallback || key;
    return fallback || key;
  };

  // Sync lang toggle — runs on load and every page navigation
  function syncLangUI() {
    var toggle = document.getElementById('langToggle');
    if (!toggle) return;
    var isCn = window.__lang === 'cn';
    toggle.classList.toggle('cn', isCn);
    var opts = toggle.querySelectorAll('.lang-option');
    opts.forEach(function(o) { o.classList.toggle('active', o.dataset.lang === window.__lang); });

    // 1. Update data-i18n elements
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.dataset.i18n;
      var text = window.__t(key);
      if (!text) return;
      if (el.tagName === 'INPUT' && (el.type === 'button' || el.type === 'submit')) {
        el.value = text;
      } else if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
        el.placeholder = text;
      } else {
        el.textContent = text;
      }
    });

    // 2. Walk all text nodes and replace using reverse lookup
    if (!window.__i18nReverse) {
      window.__i18nReverse = {};
      Object.keys(window.__i18n).forEach(function(k) {
        var entry = window.__i18n[k];
        if (entry.en && entry.en !== entry.cn) window.__i18nReverse[entry.en] = k;
        if (entry.cn && entry.cn !== entry.en) window.__i18nReverse[entry.cn] = k;
      });
    }

    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
    var textNodes = [];
    while (walker.nextNode()) {
      var p = walker.currentNode.parentNode;
      // Skip script, style, pre, code, kbd, svg, and hero lines
      if (!p || p.closest('script,style,pre,code,kbd,svg')) continue;
      if (p.closest('.hero-line') || p.closest('.start-title-line')) continue;
      // Skip elements that already have data-i18n (they're handled by step 1)
      if (p.closest('[data-i18n]') && p.closest('[data-i18n]') !== p) continue;
      textNodes.push(walker.currentNode);
    }

    textNodes.forEach(function(node) {
      var text = node.textContent.trim();
      if (!text || text.length < 2) return;
      var key = window.__i18nReverse[text];
      if (key) {
        node.textContent = window.__t(key, text);
      }
    });

    document.dispatchEvent(new CustomEvent('lang-change', { detail: { lang: window.__lang } }));
  }

  var langToggle = document.getElementById('langToggle');
  if (langToggle) {
    langToggle.addEventListener('click', function() {
      window.__lang = window.__lang === 'cn' ? 'en' : 'cn';
      localStorage.setItem('paperlens_lang', window.__lang);
      syncLangUI();
    });
    // Initial sync
    syncLangUI();
  }

  // Re-sync i18n on every page navigation
  document.addEventListener('page-loaded', function() {
    setTimeout(syncLangUI, 80);
  });

  // --- Dark mode floating particles ---
  var particlesContainer = document.getElementById('darkParticles');
  if (particlesContainer) {
    for (var pi = 0; pi < 24; pi++) {
      var p = document.createElement('div');
      p.className = 'dark-particle';
      p.style.left = (Math.random() * 100) + '%';
      p.style.top = (Math.random() * 100) + '%';
      p.style.animationDelay = (Math.random() * 6) + 's';
      particlesContainer.appendChild(p);
    }
  }

  // Scroll progress bar and parallax are now handled by Lenis + GSAP in app.js
})();
