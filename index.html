<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearningTool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/design-tokens.css" />
  <link rel="stylesheet" href="src/css/animations.css" />
  <link rel="stylesheet" href="src/css/shell.css" />
  <link rel="stylesheet" href="src/css/components.css" />
</head>
<body>

<div class="noise-overlay"></div>
<div class="cursor-dot" id="cursorDot"></div>

<main class="main">
  <div class="page-content" id="pageContent"></div>
</main>

<div class="toast-container" id="toastContainer"></div>

<div class="modal-overlay" id="adminModal" style="display:none;">
  <div class="modal">
    <h3 class="modal-title">Sign In</h3>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="adminUsername" placeholder="Username" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="adminPassword" placeholder="Password" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="adminCancel">Cancel</button>
      <button class="btn btn-accent" id="adminSubmit">Sign In</button>
    </div>
  </div>
</div>

<script type="module" src="src/js/app.js"></script>
</body>
</html>
