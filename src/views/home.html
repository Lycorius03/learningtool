<style>
  @keyframes heroReveal { to { transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  
  .hero-line { overflow: visible; margin-bottom: 4px; padding: 0.15em 0; }
  .hero-line span {
    display: block; font-family: var(--font-serif); font-size: clamp(2.8rem, 8vw, 5.5rem); font-weight: 400;
    letter-spacing: -0.02em; line-height: 1.15; transform: translateY(115%);
    animation: heroReveal 1.6s var(--ease-default) forwards;
    color: var(--color-text-primary);
  }
  .hero-line:nth-child(2) span { animation-delay: 0.1s; }
  .hero-line:nth-child(3) span { animation-delay: 0.2s; }

  .hero-wrap { min-height: 62vh; display: flex; flex-direction: column; justify-content: center; padding: var(--space-10) 0; }
  .hero-quote-wrap { position: relative; min-height: 3em; margin-top: var(--space-4); }
  .hero-quote {
    position: absolute; top: 0; left: 0; right: 0; opacity: 0;
    font-family: var(--font-serif); font-size: var(--text-lg); font-style: italic;
    color: var(--color-text-secondary); line-height: var(--leading-relaxed);
    transition: opacity 1s var(--ease-default);
  }
  .hero-quote.visible { opacity: 1; }
  .hero-quote.latin { font-style: italic; letter-spacing: 0.01em; }

  .tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-2); opacity: 0; animation: fadeInUp 0.8s var(--ease-default) 0.9s forwards; margin-top: var(--space-10); }
  .tool-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); cursor: pointer; transition: background 0.2s var(--ease-default); text-decoration: none; color: var(--color-text-primary); }
  .tool-item:hover { background: var(--color-bg-surface); }
  .tool-item-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tool-item-text h4 { font-size: var(--text-base); font-weight: var(--weight-medium); margin: 0; }
  .tool-item-text p { font-size: var(--text-xs); color: var(--color-text-tertiary); margin: 2px 0 0; }

  .status-bar { display: flex; align-items: center; gap: var(--space-3); margin-top: var(--space-8); opacity: 0; animation: fadeIn 0.8s var(--ease-default) 1.1s forwards; font-size: var(--text-xs); color: var(--color-text-tertiary); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); }
</style>

<div class="page-content-inner">

  <div class="hero-wrap">
    <div class="hero-line"><span>Read deeper.</span></div>
    <div class="hero-line"><span>Practice smarter.</span></div>
    <div class="hero-line"><span>LearningTool.</span></div>
    <div class="hero-quote-wrap">
      <p class="hero-quote latin visible" id="quoteEl">Omnia, Lucili, aliena sunt; tempus tantum nostrum est.</p>
    </div>
  </div>

  <div class="tools-grid">
    <div class="tool-item" data-route="reader" onclick="window.__lt?.router?.navigate('reader')">
      <div class="tool-item-icon" style="background:var(--color-accent-soft);color:var(--color-accent);">&#x1F4C4;</div>
      <div class="tool-item-text"><h4>论文阅读</h4><p>导入 PDF / DOCX / TXT / MD，AI 逐段解析论文要点</p></div>
    </div>
    <div class="tool-item" data-route="quiz" onclick="window.__lt?.router?.navigate('quiz')">
      <div class="tool-item-icon" style="background:var(--color-success-bg);color:var(--color-success);">&#x2713;</div>
      <div class="tool-item-text"><h4>智能刷题</h4><p>加权乱序 · 错题本 · 顺序模式，自适应权重算法</p></div>
    </div>
    <div class="tool-item" data-route="template" onclick="window.__lt?.router?.navigate('template')">
      <div class="tool-item-icon" style="background:var(--color-info-bg);color:var(--color-info);">{ }</div>
      <div class="tool-item-text"><h4>题库模板</h4><p>JSON 格式模板下载，选择题 + 解析，导入即用</p></div>
    </div>
    <div class="tool-item" data-route="settings" onclick="window.__lt?.router?.navigate('settings')">
      <div class="tool-item-icon" style="background:var(--color-bg-elevated);">&#x2699;</div>
      <div class="tool-item-text"><h4>设置</h4><p>API Key 管理 · MFAW 算法参数 · 主题偏好</p></div>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-dot"></span> 系统就绪 &middot; PDF &middot; DOCX &middot; TXT &middot; MD &middot; JSON
  </div>

<script>
(function() {
  var quotes = ['Omnia, Lucili, aliena sunt; tempus tantum nostrum est.','To strive, to seek, to find, and not to yield.'];
  var el = document.getElementById('quoteEl');
  var i = 0;
  if (!el) return;
  setInterval(function() {
    el.style.opacity = '0';
    setTimeout(function() { i = (i + 1) % 2; el.textContent = quotes[i]; el.style.opacity = '1'; }, 1000);
  }, 5000);
})();
</script>

</div>
