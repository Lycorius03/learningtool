<div class="page-content-inner" style="max-width:var(--content-max-width); margin:0 auto;">
  <button class="back-btn" onclick="window.__lt?.router?.navigate('quiz')">&larr; Quiz</button>

  <!-- ==================== MODE BADGE + COUNTER ==================== -->
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-4);">
    <span class="badge badge-accent" id="quizSessionMode">加权乱序</span>
    <span style="font-size:var(--text-sm); color:var(--color-text-secondary);" id="quizSessionCounter">第 1/20 题</span>
  </div>

  <!-- ==================== PROGRESS BAR ==================== -->
  <div class="progress-bar" style="margin-bottom:var(--space-8);">
    <div class="progress-bar-fill" id="quizSessionProgress" style="width:5%;"></div>
  </div>

  <!-- ==================== QUESTION DISPLAY ==================== -->
  <div id="quizQuestionArea" class="anim-fade-in-up">
    <!-- Question text -->
    <div style="margin-bottom:var(--space-6);">
      <h2 style="font-size:var(--text-xl); font-weight:var(--weight-semibold); color:var(--color-text-primary); line-height:var(--leading-snug);" id="quizQuestionText">
        题目加载中...
      </h2>
    </div>

    <!-- Options -->
    <div style="display:flex; flex-direction:column; gap:var(--space-3); margin-bottom:var(--space-6);" id="quizOptionsList">
      <div class="quiz-option" data-index="0" id="quizOption0">
        <span class="quiz-option-marker">A</span>
        <span>选项 A</span>
      </div>
      <div class="quiz-option" data-index="1" id="quizOption1">
        <span class="quiz-option-marker">B</span>
        <span>选项 B</span>
      </div>
      <div class="quiz-option" data-index="2" id="quizOption2">
        <span class="quiz-option-marker">C</span>
        <span>选项 C</span>
      </div>
      <div class="quiz-option" data-index="3" id="quizOption3">
        <span class="quiz-option-marker">D</span>
        <span>选项 D</span>
      </div>
    </div>
  </div>

  <!-- ==================== RESULT FEEDBACK ==================== -->
  <div id="quizResultArea" style="display:none;" class="anim-fade-in-up">
    <!-- Correct feedback -->
    <div id="quizResultCorrect" style="display:none; padding:var(--space-4); background:var(--color-success-bg); border:1px solid var(--color-success); border-radius:var(--radius-lg); margin-bottom:var(--space-4);">
      <div style="display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-2);">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="var(--color-success)" stroke-width="2"><path d="M3 8l3.5 3.5L13 5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span style="font-size:var(--text-md); font-weight:var(--weight-semibold); color:var(--color-success);">回答正确</span>
      </div>
    </div>

    <!-- Incorrect feedback -->
    <div id="quizResultIncorrect" style="display:none; padding:var(--space-4); background:var(--color-error-bg); border:1px solid var(--color-error); border-radius:var(--radius-lg); margin-bottom:var(--space-4);">
      <div style="display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-2);">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="var(--color-error)" stroke-width="2"><path d="M4 4l8 8M12 4l-8 8" stroke-linecap="round"/></svg>
        <span style="font-size:var(--text-md); font-weight:var(--weight-semibold); color:var(--color-error);">回答错误</span>
      </div>
      <div style="font-size:var(--text-sm); color:var(--color-text-secondary);" id="quizCorrectAnswerLabel">
        正确答案: -
      </div>
    </div>

    <!-- Explanation -->
    <div id="quizExplanation" style="display:none; padding:var(--space-4); background:var(--color-bg-surface); border:1px solid var(--color-border-subtle); border-radius:var(--radius-lg); margin-bottom:var(--space-5);">
      <p style="font-size:var(--text-xs); font-weight:var(--weight-medium); color:var(--color-text-tertiary); margin-bottom:var(--space-2); text-transform:uppercase; letter-spacing:0.06em;">解析</p>
      <p style="font-size:var(--text-sm); color:var(--color-text-secondary); line-height:var(--leading-normal);" id="quizExplanationText">-</p>
    </div>
  </div>

  <!-- ==================== NEXT BUTTON ==================== -->
  <div style="text-align:center; padding:var(--space-4) 0;">
    <button class="btn btn-accent btn-lg" id="quizNextBtn" style="display:none; padding:0 var(--space-10);" disabled>
      下一题
      <svg style="width:15px; height:15px;" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3l5 5-5 5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <p id="quizSessionEndMsg" style="display:none; font-size:var(--text-sm); color:var(--color-text-tertiary);">本轮刷题已结束，即将返回...</p>
  </div>

  <!-- ==================== SESSION STATS (shown at end) ==================== -->
  <div id="quizSessionStats" style="display:none; padding:var(--space-6); background:var(--color-bg-surface); border-radius:var(--radius-lg); text-align:center;">
    <h3 style="font-size:var(--text-lg); font-weight:var(--weight-semibold); color:var(--color-text-primary); margin-bottom:var(--space-4);">本轮成绩</h3>
    <div style="display:flex; justify-content:center; gap:var(--space-8);">
      <div>
        <span style="font-size:var(--text-2xl); font-weight:var(--weight-semibold); color:var(--color-success);" id="quizStatCorrect">0</span>
        <p style="font-size:var(--text-xs); color:var(--color-text-tertiary);">正确</p>
      </div>
      <div>
        <span style="font-size:var(--text-2xl); font-weight:var(--weight-semibold); color:var(--color-error);" id="quizStatIncorrect">0</span>
        <p style="font-size:var(--text-xs); color:var(--color-text-tertiary);">错误</p>
      </div>
      <div>
        <span style="font-size:var(--text-2xl); font-weight:var(--weight-semibold); color:var(--color-accent);" id="quizStatAccuracy">0%</span>
        <p style="font-size:var(--text-xs); color:var(--color-text-tertiary);">正确率</p>
      </div>
    </div>
  </div>

</div>
